- year: 2025
  title: "City-Wide Infill Housing Zoning By-law Passed"
  description: "Council gave second and third readings to the city-wide infill housing by-law amendments on June 26, 2025. The amendments allow fourplexes as-of-right in most R1 and R2 zones city-wide, with taller fourplexes (up to 39 feet) within 800 metres of frequent transit. The changes were tied to Winnipeg's federal Housing Accelerator Fund commitments."
  legacy: "The most significant zoning reform in Winnipeg's modern history, unlocking missing middle housing across the entire city."
  sources:
    primary:
      url: "https://www.winnipeg.ca/building-development/housing/housing-accelerator-fund/infill-housing"
      text: "City of Winnipeg — Infill Housing"
    secondary:
      url: "https://www.yesinwpg.com/2024/05/a-step-closer-to-solving-winnipegs-missing-middle-problem/"
      text: "YIMBY Winnipeg"

- year: 2025
  title: "Winnipeg Transit Primary Route Network Launched"
  description: "In June 2025, Winnipeg Transit launched the new city-wide primary route network — the first major redesign of Winnipeg's bus system in decades. The network provides 15-minute-or-better frequencies on key routes throughout the day, seven days a week. Implementation was accelerated one year ahead of schedule."
  legacy: "Transforms Winnipeg Transit from a hub-and-spoke system to a frequent-grid network, making transit more useful for spontaneous travel."
  sources:
    primary:
      url: "https://info.winnipegtransit.com/en/major-projects/transit-master-plan/"
      text: "Winnipeg Transit Master Plan"

- year: 2025
  title: "Portage Place Redevelopment Begins"
  description: "True North Real Estate Development (TNRED), which acquired Portage Place in November 2024, began work on the $650 million redevelopment in 2025. The project involves all three levels of government and the Southern Chiefs' Organization (SCO), and will transform the struggling mall into a healthcare tower, residential tower, community centres, and retail/food services."
  legacy: "The largest single development investment in downtown Winnipeg's history, expected to reshape the city's core by 2028."
  sources:
    primary:
      url: "https://www.tnse.com/news/true-north-real-estate-development-acquires-portage-place-mall/"
      text: "True North — Portage Place Acquisition"
    secondary:
      url: "https://heritagewinnipeg.com/news/portage-place-mall-redevelopment/"
      text: "Heritage Winnipeg"

- year: 2024
  title: "True North Acquires Portage Place"
  description: "True North Real Estate Development acquired Portage Place mall, land, and assets on November 29, 2024. The 1.2-million-square-foot mall on 6.4 acres of downtown land came with federal support of $10 million from Prairie Economic Development Canada for community space creation."
  sources:
    primary:
      url: "https://www.tnse.com/news/true-north-real-estate-development-acquires-portage-place-mall/"
      text: "True North — Portage Place Acquisition"

- year: 2024
  title: "Phase 2 Rapid Zoning Amendments Approved"
  description: "In July 2024, City Council approved amendments to the Winnipeg and Downtown Zoning By-laws allowing secondary suites and up to three-unit dwellings in established residential neighbourhoods. The amendments also reduced minimum lot widths for two-family dwellings from 32 to 25 feet."
  sources:
    primary:
      url: "https://www.winnipeg.ca/news/2024-07-19-council-approves-amendments-winnipeg-and-downtown-winnipeg-zoning-laws"
      text: "City of Winnipeg News"

- year: 2024
  title: "Wawanesa Opens National HQ at True North Square"
  description: "In March 2024, Wawanesa Mutual Insurance Company opened its new national headquarters at True North Square — a purpose-built 21-storey, 360,000 sq ft building bringing 1,300 employees downtown. Wawanesa also committed $500,000 to downtown revitalization initiatives."
  legacy: "Demonstrated that major private investment in downtown Winnipeg office space is viable, anchoring the True North Square development."
  sources:
    primary:
      url: "https://www.globenewswire.com/news-release/2024/03/13/2845770/0/en/Wawanesa-Opens-New-National-Headquarters-at-True-North-Square-Announces-500-000-for-a-More-Vibrant-Downtown.html"
      text: "Globe Newswire"

- year: 2024
  title: "Corridor and Mall Zoning Amendments"
  description: "Open houses were held in October 2024 to explain proposed changes to zoning at mall sites and along commercial corridors. The amendments permit as-of-right residential development at these locations, implementing OurWinnipeg 2045 and Complete Communities 2.0 policy."
  sources:
    primary:
      url: "https://www.winnipeg.ca/building-development/city-planning-design/ourwinnipeg/complete-communities-direction-strategy-20"
      text: "Complete Communities 2.0"

- year: 2021
  title: "Winnipeg Transit Master Plan Adopted"
  description: "On April 29, 2021, Winnipeg City Council adopted the Winnipeg Transit Master Plan — the long-range strategic plan for public transit through 2045. The plan calls for a primary route network, three rapid transit lines, and a downtown elevated transitway anchored at Union Station, at a projected cost of $588M–$1.1B."
  legacy: "The most comprehensive rethinking of Winnipeg's transit system since the post-streetcar era, providing a roadmap for transit-oriented growth."
  sources:
    primary:
      url: "https://www.winnipeg.ca/city-governance/strategic-plans-policies/winnipeg-transit-master-plan"
      text: "City of Winnipeg — Transit Master Plan"
    secondary:
      url: "https://www.cbc.ca/news/canada/manitoba/winnipeg-transit-rapid-transit-plan-1.5940539"
      text: "CBC News"

- year: 2021
  title: "OurWinnipeg 2045 Adopted"
  description: "Council adopted OurWinnipeg 2045 — the city's new development plan guiding growth through 2045. The plan addresses Winnipeg's sprawl challenge: from 1971–2019 the settlement area nearly doubled while population grew by only 37%. It establishes a vision for transit-oriented, complete communities growth."
  legacy: "The statutory foundation for Winnipeg's zoning reforms, transit investment, and Complete Communities 2.0 direction strategy."
  sources:
    primary:
      url: "https://www.winnipeg.ca/building-development/city-planning-design/ourwinnipeg"
      text: "City of Winnipeg — OurWinnipeg"

- year: 2020
  title: "Southwest Transitway Phase 2 Opens"
  description: "On April 12, 2020, Phase 2 of the Southwest Transitway opened, extending from Jubilee Avenue to Markham Road and the University of Manitoba. The BLUE rapid transit line began operating along the full 11-kilometre corridor, with 15 new bus routes launched to support the network."
  legacy: "Connected the University of Manitoba to the rapid transit network, significantly improving access for students and staff."
  sources:
    primary:
      url: "https://info.winnipegtransit.com/en/completed-major-projects/southwest-transitway/"
      text: "Winnipeg Transit — Southwest Transitway"

- year: 2018
  title: "Portage and Main Crosswalk Referendum"
  description: "A non-binding plebiscite held alongside the October 2018 municipal election asked Winnipeg residents whether to reopen the Portage and Main intersection to pedestrians. Approximately 65% voted to keep the intersection closed — a result that disappointed many urbanists and pedestrian advocates."
  legacy: "The referendum outcome maintained the car-centric character of Winnipeg's most prominent intersection, cementing it as a symbol of the tension between pedestrian and vehicle priorities in the city."
  sources:
    primary:
      url: "https://www.cbc.ca/news/canada/manitoba/"
      text: "CBC Manitoba"

- year: 2015
  title: "Pedestrian and Cycling Strategies Adopted"
  description: "Winnipeg City Council adopted the Pedestrian and Cycling Strategies in July 2015, following a public engagement process involving over 3,000 residents and stakeholders. The strategies set a long-term vision for walking and cycling with seven overarching goals."
  legacy: "Established the policy framework for annual cycling infrastructure investment tied to road renewal projects."
  sources:
    primary:
      url: "https://legacy.winnipeg.ca/publicworks/pedestriansCycling/default.stm"
      text: "City of Winnipeg — Walking & Biking"

- year: 2012
  title: "Southwest Transitway Phase 1 Opens"
  description: "On April 8, 2012, Phase 1 of the Southwest Transitway opened, connecting downtown Winnipeg to Pembina Highway at Jubilee Avenue via a dedicated bus rapid transit corridor parallel to the railway tracks. Buses operate at speeds up to 80 km/h on a physically separated roadway."
  legacy: "Winnipeg's first rapid transit infrastructure, demonstrating the viability of dedicated BRT and establishing the template for further expansion."
  sources:
    primary:
      url: "https://info.winnipegtransit.com/en/completed-major-projects/southwest-transitway/"
      text: "Winnipeg Transit — Southwest Transitway"
    secondary:
      url: "https://www.transportaction.ca/regions/prairies/winnipegs-southwest-transitway-complete/"
      text: "Transport Action Canada"

- year: 1955
  title: "Streetcar Service Ends"
  description: "Winnipeg's electric streetcar system, which had operated since 1882, ceased operation in 1955. The abandonment of streetcar service — in favour of buses and automobiles — accelerated post-war suburban expansion and began decades of car-centric development that fundamentally changed Winnipeg's urban form."
  legacy: "The end of streetcars marked the beginning of Winnipeg's sprawl era. The inner-city neighbourhoods built along streetcar lines retain their walkable character today; subsequent suburban development does not."
  sources:
    primary:
      url: "https://en.wikipedia.org/wiki/Winnipeg_Transit"
      text: "Winnipeg Transit Wikipedia"

- year: 1882
  title: "Winnipeg's First Streetcar Line"
  description: "Winnipeg launched its first electric streetcar line in 1882, beginning an era of transit-oriented urban growth. Streetcar lines radiated from downtown along Portage Avenue, Main Street, Corydon Avenue, and other corridors, shaping the development of the city's inner-city neighbourhoods over the following 70 years."
  legacy: "The streetcar network shaped the walkable, mixed-use character of Winnipeg's inner-city neighbourhoods — a character that endures today and is the foundation of the city's most liveable areas."
  sources:
    primary:
      url: "https://en.wikipedia.org/wiki/Winnipeg_Transit"
      text: "Winnipeg Transit Wikipedia"

- year: 1873
  title: "Winnipeg Incorporated as a City"
  description: "Winnipeg was incorporated as a city on November 8, 1873, making it one of the earliest cities in Western Canada. The city was established at the confluence of the Red and Assiniboine Rivers — a location of Indigenous significance and a strategic trading hub since the fur trade era."
  legacy: "Winnipeg grew rapidly in the late 19th century as the gateway to Western Canadian settlement, establishing a dense downtown and inner-city fabric that underpins its urban character today."
  sources:
    primary:
      url: "https://en.wikipedia.org/wiki/Winnipeg"
      text: "Winnipeg Wikipedia"
