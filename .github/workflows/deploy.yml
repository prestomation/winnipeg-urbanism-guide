name: Deploy Hugo Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      TZ: America/Winnipeg
      HUGO_ENVIRONMENT: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Clone hugo-book theme
        run: git clone --depth 1 https://github.com/alex-shpak/hugo-book themes/hugo-book

      - name: Install Node.js dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          fi

      - name: Validate timeline
        run: python3 scripts/validate-timeline.py

      - name: Build
        run: hugo --gc --minify

      - name: Install Pagefind
        run: npm install -g pagefind

      - name: Build search index
        run: pagefind --site public

      - name: Check links (non-blocking)
        run: python3 scripts/check-external-links.py || true

      - name: Deploy to gh-pages
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get current SHA for commit message
          DEPLOY_SHA=$(git rev-parse HEAD)

          # Create or reset orphan gh-pages branch
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout gh-pages

            # Preserve PR preview directories
            PREVIEWS=$(ls -d pr-* 2>/dev/null || true)

            # Clear current content
            git rm -rf . --quiet

            # Restore PR previews if any
            if [ -n "$PREVIEWS" ]; then
              git checkout FETCH_HEAD -- $PREVIEWS 2>/dev/null || true
            fi
          else
            git checkout --orphan gh-pages
            git rm -rf . --quiet
          fi

          # Copy built site
          cp -r public/* .
          rm -rf public

          # Add and commit
          git add -A
          git commit -m "Deploy: $DEPLOY_SHA" --allow-empty

          # Push
          git push origin gh-pages --force
