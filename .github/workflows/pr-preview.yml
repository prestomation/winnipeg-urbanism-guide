name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      TZ: America/Winnipeg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Build PR preview
        run: |
          hugo --gc --minify --baseURL "https://prestomation.github.io/winnipeg-urbanism-guide/pr-${{ github.event.number }}/"

      - name: Install Pagefind
        run: npm install -g pagefind

      - name: Build search index
        run: pagefind --site public

      - name: Deploy PR preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || git checkout --orphan gh-pages

          git checkout gh-pages
          mkdir -p pr-${{ github.event.number }}
          rm -rf pr-${{ github.event.number }}/*
          cp -r public/* pr-${{ github.event.number }}/

          git add pr-${{ github.event.number }}
          git commit -m "PR preview: #${{ github.event.number }}" --allow-empty
          git push origin gh-pages

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed: https://prestomation.github.io/winnipeg-urbanism-guide/pr-${{ github.event.number }}/`
            })
